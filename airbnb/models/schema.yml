models:
  - name: dim_listings
    description: Cleansed table which contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 1000
          severity: error
    columns:
      - name: listing_id
        description: primary key for listings
        data_tests:
          - unique
          - not_null
  
      - name: host_id
        description: host id's reference the host
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_host')
                field: host_id

      - name: room_type
        data_tests:
         - accepted_values:
             arguments:
               values: ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']

      - name: minimum_nights
        data_tests:
          - positive_values 



  - name: dim_host
    description: host model with documentation of the host history.
    config:
      contract:
        enforced: true
    columns:
          - name: host_id
            data_type: integer
          - name: host_name
            data_type: string
          - name: is_superhost
            data_type: boolean
          - name: updated_at
            data_type: timestamp
          - name: created_at
            data_type: timestamp
          